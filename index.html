<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPK Space Runner - Edisi Santai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background: #020617; 
            color: white;
            overflow-x: hidden;
        }
        .space-font { font-family: 'Orbitron', sans-serif; }
        
        /* Animasi Running Text yang sudah diperlambat */
        @keyframes scroll {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-250%); } /* Jarak lebih jauh agar tidak numpuk */
        }

        .running-row {
            display: flex;
            white-space: nowrap;
            padding: 20px 0;
            position: relative;
            min-height: 100px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
        }

        .animate-run {
            display: inline-block;
            /* Kecepatan diatur via durasi CSS variable */
            animation: scroll var(--speed) linear infinite;
        }

        .num-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            margin: 0 15px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            font-weight: 900;
            font-size: 1.5rem;
            transition: all 0.2s;
            cursor: pointer;
            color: #94a3b8;
        }

        .num-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.1); }
        
        /* Warna-warna hasil */
        .correct { background: #10b981 !important; border-color: #34d399 !important; color: white; box-shadow: 0 0 15px #10b981; }
        .wrong { background: #ef4444 !important; border-color: #f87171 !important; }
        
        /* Warna BIRU khusus KPK */
        .kpk-match { 
            background: #2563eb !important; 
            border-color: #60a5fa !important; 
            box-shadow: 0 0 25px #3b82f6, inset 0 0 10px #ffffff; 
            transform: scale(1.25); 
            color: white; 
            z-index: 50;
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-6">
            <h1 class="space-font text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 italic uppercase">
                KPK SPACE RUNNER
            </h1>
            <p class="text-cyan-500 text-xs tracking-[0.3em] font-bold mt-2">EDISI BELAJAR SANTAI - SDN 165 TJB</p>
        </div>

        <div id="setup" class="bg-slate-900/90 p-8 rounded-[3rem] border-4 border-cyan-500/20 backdrop-blur-xl shadow-2xl max-w-xl mx-auto">
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-cyan-400 uppercase mb-3 text-center">Tentukan Angka Kelipatan</label>
                    <div class="flex gap-4">
                        <input type="number" id="t1" value="2" class="w-full p-5 bg-slate-800 rounded-2xl text-center text-2xl font-black text-emerald-400 border-2 border-emerald-500/20 focus:border-emerald-500 outline-none">
                        <div class="flex items-center text-xl font-bold text-slate-500">&</div>
                        <input type="number" id="t2" value="3" class="w-full p-5 bg-slate-800 rounded-2xl text-center text-2xl font-black text-orange-400 border-2 border-orange-500/20 focus:border-orange-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-cyan-400 uppercase mb-3 text-center">Pilih Kecepatan (Sudah Diperlambat)</label>
                    <select id="speed-lvl" class="w-full p-4 bg-slate-800 rounded-2xl font-bold text-white border-2 border-cyan-500/20 outline-none text-center">
                        <option value="60">SANGAT LAMBAT (Rileks)</option>
                        <option value="40">NORMAL (Sedang)</option>
                        <option value="25">CEPAT (Tantangan)</option>
                    </select>
                </div>
                <button onclick="startMission()" class="w-full bg-gradient-to-r from-cyan-600 to-blue-700 space-font py-5 rounded-2xl shadow-lg hover:brightness-110 active:scale-95 transition-all uppercase text-lg font-black">Luncurkan Angka! 🚀</button>
            </div>
        </div>

        <div id="arena" class="hidden space-y-8 mt-6">
            <div class="flex justify-between items-center bg-slate-900/80 p-6 rounded-3xl border border-white/10">
                <div class="text-center">
                    <p class="text-[10px] uppercase text-emerald-400 font-bold">Pemain 1</p>
                    <p id="s1" class="text-4xl font-black text-white">0</p>
                </div>
                <div class="text-center bg-blue-600/20 px-6 py-2 rounded-2xl border border-blue-500/50">
                    <p class="text-[10px] uppercase text-blue-300 font-bold">Target KPK</p>
                    <p id="kpk-val" class="text-3xl font-black text-blue-400 space-font">?</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] uppercase text-orange-400 font-bold">Pemain 2</p>
                    <p id="s2" class="text-4xl font-black text-white">0</p>
                </div>
            </div>

            <div class="overflow-hidden p-2 border-l-8 border-emerald-500">
                <p class="text-[10px] font-black text-emerald-500 mb-2 uppercase">Jalur Kelipatan <span id="p1-info"></span></p>
                <div class="running-row">
                    <div id="track-1" class="animate-run"></div>
                </div>
            </div>

            <div class="overflow-hidden p-2 border-l-8 border-orange-500">
                <p class="text-[10px] font-black text-orange-500 mb-2 uppercase">Jalur Kelipatan <span id="p2-info"></span></p>
                <div class="running-row">
                    <div id="track-2" class="animate-run"></div>
                </div>
            </div>

            <div class="text-center">
                <p class="text-blue-300 text-xs italic mb-4">Klik angka KPK (warna biru) untuk poin 5x lipat!</p>
                <button onclick="location.reload()" class="px-8 py-3 bg-slate-800 text-slate-400 rounded-xl text-xs uppercase font-bold hover:bg-red-900 hover:text-white transition-all">Reset Misi</button>
            </div>
        </div>
    </div>

    <script>
        let sc1 = 0, sc2 = 0;
        let kpkValue = 0;

        function getKPK(a, b) {
            let min = (a > b) ? a : b;
            while (true) {
                if (min % a == 0 && min % b == 0) return min;
                min++;
            }
        }

        function startMission() {
            const v1 = parseInt(document.getElementById('t1').value);
            const v2 = parseInt(document.getElementById('t2').value);
            const speedTime = document.getElementById('speed-lvl').value;

            if(!v1 || !v2) return alert("Masukkan angka dulu, Kapten!");

            kpkValue = getKPK(v1, v2);
            document.getElementById('kpk-val').innerText = kpkValue;
            document.getElementById('p1-info').innerText = v1;
            document.getElementById('p2-info').innerText = v2;
            
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('arena').classList.remove('hidden');

            // Mengatur kecepatan lari angka
            document.documentElement.style.setProperty('--speed', speedTime + 's');

            generateNumbers('track-1', v1, 1);
            generateNumbers('track-2', v2, 2);
        }

        function generateNumbers(trackId, target, player) {
            const track = document.getElementById(trackId);
            // Membuat angka 1 sampai 100
            for (let i = 1; i <= 100; i++) {
                const btn = document.createElement('div');
                btn.className = "num-btn";
                btn.innerText = i;
                btn.onclick = () => check(btn, i, target, player);
                track.appendChild(btn);
            }
        }

        function check(btn, val, target, player) {
            if(btn.style.pointerEvents === "none") return;

            // Logika KPK (Warna Biru)
            if (val % kpkValue === 0) {
                btn.classList.add('kpk-match');
                addScore(player, 50); 
                playSFX(800, "sine");
            } 
            // Logika Kelipatan Biasa (Warna Hijau/Orange)
            else if (val % target === 0) {
                btn.classList.add('correct');
                addScore(player, 10);
                playSFX(400, "sine");
            } 
            // Logika Salah
            else {
                btn.classList.add('wrong');
                addScore(player, -5);
                playSFX(100, "square");
                setTimeout(() => btn.classList.remove('wrong'), 300);
                return;
            }

            btn.style.pointerEvents = "none"; 
        }

        function addScore(p, point) {
            if(p === 1) { sc1 += point; document.getElementById('s1').innerText = sc1; }
            else { sc2 += point; document.getElementById('s2').innerText = sc2; }
        }

        function playSFX(freq, type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch(e) {}
        }
    </script>
</body>
</html>
