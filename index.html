<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPK Space Runner - SDN 165 TJB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background: #0f172a; 
            color: white;
            overflow-x: hidden;
        }
        .space-font { font-family: 'Orbitron', sans-serif; }
        
        /* Animasi Running Text */
        @keyframes scroll {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        .running-row {
            display: flex;
            white-space: nowrap;
            padding: 10px 0;
            position: relative;
            min-height: 80px;
        }

        .animate-run {
            display: inline-block;
            animation: scroll var(--speed) linear infinite;
        }

        .num-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            margin: 0 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .num-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .correct { background: #10b981 !important; border-color: #059669 !important; transform: scale(1.1); color: white; }
        .wrong { background: #ef4444 !important; border-color: #b91c1c !important; }
        .kpk-match { background: #3b82f6 !important; border-color: #1d4ed8 !important; box-shadow: 0 0 20px #3b82f6; transform: scale(1.2); color: white; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="space-font text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 italic">
                KPK SPACE RUNNER
            </h1>
            <p class="text-blue-300 text-[10px] tracking-[0.5em] uppercase mt-2">Uji Kecepatan & Ketepatan Matematika</p>
        </div>

        <div id="setup" class="bg-slate-900/80 p-8 rounded-[2rem] border-2 border-blue-500/30 backdrop-blur-md shadow-2xl max-w-2xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-bold text-blue-400 uppercase mb-2">Kelipatan Pemain 1 & 2</label>
                    <div class="flex gap-2">
                        <input type="number" id="t1" value="2" class="w-full p-3 bg-slate-800 rounded-xl text-center font-bold text-emerald-400 border border-emerald-500/30">
                        <input type="number" id="t2" value="3" class="w-full p-3 bg-slate-800 rounded-xl text-center font-bold text-orange-400 border border-orange-500/30">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-blue-400 uppercase mb-2">Pilih Level Kecepatan</label>
                    <select id="speed-lvl" class="w-full p-3 bg-slate-800 rounded-xl font-bold text-white border border-blue-500/30 outline-none">
                        <option value="20">Level 1 (Lambat)</option>
                        <option value="12">Level 2 (Sedang)</option>
                        <option value="7">Level 3 (Cepat!)</option>
                    </select>
                </div>
            </div>
            <button onclick="startMission()" class="w-full mt-6 bg-gradient-to-r from-blue-600 to-indigo-700 space-font py-4 rounded-xl shadow-lg hover:shadow-blue-500/20 transition-all uppercase text-sm font-black">Mulai Misi 🚀</button>
        </div>

        <div id="arena" class="hidden space-y-12 mt-10">
            <div class="flex flex-wrap justify-around gap-4 bg-slate-900/50 p-4 rounded-2xl border border-white/10">
                <div class="text-center">
                    <p class="text-[9px] uppercase text-slate-400">Target KPK</p>
                    <p id="kpk-val" class="text-2xl font-black text-blue-400 space-font">?</p>
                </div>
                <div class="text-center border-x border-white/10 px-8">
                    <p class="text-[9px] uppercase text-emerald-400">Skor P1</p>
                    <p id="s1" class="text-2xl font-black text-white">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[9px] uppercase text-orange-400">Skor P2</p>
                    <p id="s2" class="text-2xl font-black text-white">0</p>
                </div>
            </div>

            <div class="relative overflow-hidden bg-emerald-900/20 rounded-3xl border-l-4 border-emerald-500 p-2">
                <p class="absolute left-4 top-2 text-[8px] font-bold text-emerald-400 uppercase">Track Pemain 1 (Kelipatan <span id="p1-info"></span>)</p>
                <div class="running-row">
                    <div id="track-1" class="animate-run"></div>
                </div>
            </div>

            <div class="relative overflow-hidden bg-orange-900/20 rounded-3xl border-l-4 border-orange-500 p-2">
                <p class="absolute left-4 top-2 text-[8px] font-bold text-orange-400 uppercase">Track Pemain 2 (Kelipatan <span id="p2-info"></span>)</p>
                <div class="running-row">
                    <div id="track-2" class="animate-run"></div>
                </div>
            </div>

            <p class="text-center text-blue-300/50 text-[10px] animate-pulse">INFO: Warna Biru adalah KPK (Skor 2x Lipat!)</p>
            <button onclick="location.reload()" class="w-full py-2 text-[10px] text-slate-500 hover:text-white uppercase font-bold">Berhenti & Ulangi</button>
        </div>
    </div>

    <script>
        let sc1 = 0, sc2 = 0;
        let kpkValue = 0;

        // Fungsi cari KPK
        function getKPK(a, b) {
            let min = (a > b) ? a : b;
            while (true) {
                if (min % a == 0 && min % b == 0) return min;
                min++;
            }
        }

        function startMission() {
            const v1 = parseInt(document.getElementById('t1').value);
            const v2 = parseInt(document.getElementById('t2').value);
            const speed = document.getElementById('speed-lvl').value;

            if(!v1 || !v2) return alert("Isi koordinat kelipatan, Kapten!");

            kpkValue = getKPK(v1, v2);
            document.getElementById('kpk-val').innerText = kpkValue;
            document.getElementById('p1-info').innerText = v1;
            document.getElementById('p2-info').innerText = v2;
            
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('arena').classList.remove('hidden');

            // Set kecepatan running text
            document.documentElement.style.setProperty('--speed', speed + 's');

            createNumbers('track-1', v1, 1);
            createNumbers('track-2', v2, 2);
        }

        function createNumbers(trackId, target, player) {
            const track = document.getElementById(trackId);
            // Buat deretan angka 1-100
            for (let i = 1; i <= 100; i++) {
                const btn = document.createElement('div');
                btn.className = "num-btn";
                btn.innerText = i;
                btn.onclick = () => check(btn, i, target, player);
                track.appendChild(btn);
            }
        }

        function check(btn, val, target, player) {
            if(btn.style.pointerEvents === "none") return;

            // Jika KPK (Warna Biru)
            if (val % kpkValue === 0) {
                btn.classList.add('kpk-match');
                addScore(player, 50);
                playTone(600, "sine");
            } 
            // Jika Kelipatan Biasa (Warna Hijau)
            else if (val % target === 0) {
                btn.classList.add('correct');
                addScore(player, 10);
                playTone(440, "sine");
            } 
            // Jika Salah (Warna Merah)
            else {
                btn.classList.add('wrong');
                addScore(player, -10);
                playTone(150, "square");
                setTimeout(() => btn.classList.remove('wrong'), 500);
                return; // Jangan matikan tombol kalau salah agar bisa coba lagi
            }

            btn.style.pointerEvents = "none"; // Matikan tombol jika sudah benar/KPK
        }

        function addScore(p, point) {
            if(p === 1) { sc1 += point; document.getElementById('s1').innerText = sc1; }
            else { sc2 += point; document.getElementById('s2').innerText = sc2; }
        }

        function playTone(freq, type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.setValueAtTime(0.05, ctx.currentTime);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        }
    </script>
</body>
</html>
