<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Kelipatan Seru - SDN 165 TJB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #f0f9ff; }
        .game-font { font-family: 'Fredoka One', cursive; }
        .number-btn { transition: all 0.2s; transform: scale(1); }
        .number-btn:active { transform: scale(0.9); }
        .winner-anim { animation: bounce 0.5s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-6">
            <h1 class="game-font text-4xl text-indigo-600 drop-shadow-md">🎮 GAME KELIPATAN</h1>
            <p class="text-slate-500 font-bold uppercase text-xs tracking-widest">Asah Otak Bersama Teman</p>
        </div>

        <div id="setup-menu" class="bg-white p-6 rounded-[2.5rem] shadow-xl border-4 border-indigo-200 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-black text-slate-400 mb-2 uppercase">1. Pilih Kelipatan</label>
                    <div class="flex gap-2">
                        <input type="number" id="target-1" value="2" class="w-full p-3 bg-indigo-50 rounded-2xl text-center font-black text-indigo-600 border-2 border-indigo-100">
                        <input type="number" id="target-2" value="3" class="w-full p-3 bg-rose-50 rounded-2xl text-center font-black text-rose-600 border-2 border-rose-100">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 mb-2 uppercase">2. Level (Maks Angka)</label>
                    <select id="game-level" class="w-full p-3 bg-amber-50 rounded-2xl font-black text-amber-600 border-2 border-amber-100 outline-none">
                        <option value="20">Level 1 (Sampai 20)</option>
                        <option value="50">Level 2 (Sampai 50)</option>
                        <option value="100">Level 3 (Sampai 100)</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="startGame()" class="w-full bg-indigo-600 text-white game-font py-3 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all uppercase tracking-wider">Mulai Main!</button>
                </div>
            </div>
        </div>

        <div id="game-area" class="hidden space-y-8">
            
            <div class="bg-white p-6 rounded-[2.5rem] shadow-md border-b-8 border-indigo-500">
                <div class="flex justify-between items-center mb-4">
                    <div class="bg-indigo-600 text-white px-4 py-1 rounded-full text-xs font-black uppercase">Pemain 1: Kelipatan <span id="p1-target-val">0</span></div>
                    <div class="text-indigo-600 font-black">Skor: <span id="score-1" class="text-2xl">0</span></div>
                </div>
                <div id="grid-1" class="flex flex-wrap gap-2 justify-center"></div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-md border-b-8 border-rose-500">
                <div class="flex justify-between items-center mb-4">
                    <div class="bg-rose-600 text-white px-4 py-1 rounded-full text-xs font-black uppercase">Pemain 2: Kelipatan <span id="p2-target-val">0</span></div>
                    <div class="text-rose-600 font-black">Skor: <span id="score-2" class="text-2xl">0</span></div>
                </div>
                <div id="grid-2" class="flex flex-wrap gap-2 justify-center"></div>
            </div>

            <button onclick="location.reload()" class="w-full bg-slate-800 text-white font-black py-3 rounded-2xl uppercase text-xs">Reset Game 🔄</button>
        </div>
    </div>

    <script>
        let score1 = 0;
        let score2 = 0;

        function startGame() {
            const t1 = parseInt(document.getElementById('target-1').value);
            const t2 = parseInt(document.getElementById('target-2').value);
            const max = parseInt(document.getElementById('game-level').value);

            if(!t1 || !t2) return alert("Isi angka kelipatannya dulu, Pak!");

            document.getElementById('p1-target-val').innerText = t1;
            document.getElementById('p2-target-val').innerText = t2;
            document.getElementById('setup-menu').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');

            renderGrid('grid-1', t1, max, 1);
            renderGrid('grid-2', t2, max, 2);
        }

        function renderGrid(elementId, target, max, player) {
            const container = document.getElementById(elementId);
            container.innerHTML = "";

            for (let i = 1; i <= max; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = "number-btn w-12 h-12 md:w-14 md:h-14 bg-slate-100 rounded-xl font-black text-slate-600 border-2 border-slate-200 hover:bg-slate-200";
                
                btn.onclick = function() {
                    checkAnswer(btn, i, target, player);
                };

                container.appendChild(btn);
            }
        }

        function checkAnswer(btn, value, target, player) {
            // Jangan bisa diklik dua kali
            if(btn.disabled) return;

            if (value % target === 0) {
                // Benar
                btn.classList.remove('bg-slate-100', 'text-slate-600');
                btn.classList.add('bg-emerald-500', 'text-white', 'border-emerald-600', 'scale-110');
                if(player === 1) { score1 += 10; document.getElementById('score-1').innerText = score1; }
                else { score2 += 10; document.getElementById('score-2').innerText = score2; }
                btn.disabled = true;
                playTone(440, "sine"); // Suara benar
            } else {
                // Salah
                btn.classList.remove('bg-slate-100');
                btn.classList.add('bg-red-500', 'text-white', 'border-red-600', 'animate-shake');
                if(player === 1) { score1 -= 5; document.getElementById('score-1').innerText = score1; }
                else { score2 -= 5; document.getElementById('score-2').innerText = score2; }
                
                // Beri efek merah sebentar saja
                setTimeout(() => {
                    btn.classList.remove('bg-red-500', 'text-white', 'border-red-600');
                    btn.classList.add('bg-slate-100', 'text-slate-600');
                }, 500);
                playTone(150, "square"); // Suara salah
            }
        }

        // Efek Suara Sederhana
        function playTone(freq, type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }
    </script>

</body>
</html>
